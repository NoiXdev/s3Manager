name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — must already exist'
        required: true

permissions:
  contents: write

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags are required for conventional-changelog.
          fetch-depth: 0
          # Releases land on main: it is only lightly protected (no PR / status-check
          # rules), so the default GITHUB_TOKEN can push the CHANGELOG commit directly
          # — no PAT or bypass actor needed. The strict PR gate lives on develop.
          ref: main

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips the Electron binary download we don't need here.
        run: npm ci --ignore-scripts

      - name: Sync package version to release tag
        # conventional-changelog labels commits-since-the-last-tag with the
        # package.json version. If package.json lags the tag, the newest section
        # is mislabeled with a reversed compare link. Derive the version from the
        # tag (strip the leading "v") and write it back so the labels match.
        # --allow-same-version makes this a no-op when they already agree.
        run: |
          TAG='${{ github.event.inputs.tag || github.ref_name }}'
          npm version "${TAG#v}" --no-git-tag-version --allow-same-version

      - name: Generate full CHANGELOG.md
        run: |
          npm run changelog
          # conventional-changelog can prepend a blank line; drop any leading
          # blank lines so the file always starts at the first version heading.
          sed -i '/./,$!d' CHANGELOG.md

      - name: Extract latest release notes
        # Slice out just the newest version section for the GitHub Release body.
        run: awk '/^#{1,3} \[?v?[0-9]+\.[0-9]+/{c++} c==1' CHANGELOG.md > RELEASE_NOTES.md

      - name: Commit version + CHANGELOG back to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Stage first, then check the staged diff: `git diff --quiet` ignores
          # untracked files, so a freshly generated CHANGELOG.md (not yet tracked)
          # would be silently skipped. `git add` + `--cached` detects new files too.
          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo 'Version and CHANGELOG.md unchanged — nothing to commit.'
          else
            git commit -m "chore(release): ${{ github.event.inputs.tag || github.ref_name }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Assemble release body
        run: cp RELEASE_NOTES.md release_body.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release_body.md

  build:
    name: Build – ${{ matrix.name }}
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            artifact: out/make/**/*.dmg

          - name: Windows x64
            os: windows-latest
            artifact: out/make/squirrel.windows/**/*.exe

          - name: Linux x64
            os: ubuntu-latest
            artifact: out/make/**/*.{deb,rpm}
            apt_deps: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.apt_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Sync package version to release tag
        # This job builds from the tagged commit, whose package.json may predate
        # the version bump the changelog job pushes to main. Set it here too so
        # the distributables are stamped with the release version (not committed
        # — the changelog job owns the persisted bump).
        shell: bash
        run: |
          TAG='${{ github.event.inputs.tag || github.ref_name }}'
          npm version "${TAG#v}" --no-git-tag-version --allow-same-version

      - name: Import signing certificate (macOS)
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Prepare notarization credentials (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          KEY_PATH="$RUNNER_TEMP/apple_api_key.p8"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"

      - name: Build distributables
        # @electron/osx-sign and @electron/notarize log via the `debug` module and are
        # silent by default. On macOS, notarization can wait several minutes on Apple's
        # notary service with no output — which looks like a hang. Enabling DEBUG surfaces
        # the signing + "waiting for notarization" progress so the build is never mistaken
        # for stuck. Harmless on Windows/Linux (those namespaces never fire).
        env:
          DEBUG: electron-osx-sign,electron-notarize
        run: npm run make

      - name: Clean up notarization key (macOS)
        if: always() && matrix.os == 'macos-latest'
        run: rm -f "$RUNNER_TEMP/apple_api_key.p8"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: ${{ matrix.artifact }}
