name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — must already exist'
        required: true

permissions:
  contents: write

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history + tags are required for conventional-changelog.
          fetch-depth: 0
          # Check out the branch (not the detached tag) so we can commit CHANGELOG.md back.
          ref: develop
          # Push back to develop with a PAT, not the default GITHUB_TOKEN: the
          # `protect-develop` ruleset blocks direct pushes, and the GitHub Actions
          # bot cannot be a bypass actor on a user-owned repo. A PAT owned by an
          # admin is attributed to that admin, whom the ruleset's admin bypass
          # already covers. RELEASE_TOKEN: fine-grained PAT, Contents: read/write.
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips the Electron binary download we don't need here.
        run: npm ci --ignore-scripts

      - name: Generate full CHANGELOG.md
        run: npm run changelog

      - name: Extract latest release notes
        # Slice out just the newest version section for the GitHub Release body.
        run: awk '/^#{1,3} \[?v?[0-9]+\.[0-9]+/{c++} c==1' CHANGELOG.md > RELEASE_NOTES.md

      - name: Commit CHANGELOG.md back to develop
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- CHANGELOG.md; then
            echo 'CHANGELOG.md unchanged — nothing to commit.'
          else
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG for ${{ github.event.inputs.tag || github.ref_name }} [skip ci]"
            git push origin HEAD:develop
          fi

      - name: Assemble release body
        run: cp RELEASE_NOTES.md release_body.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release_body.md

  build:
    name: Build – ${{ matrix.name }}
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            artifact: out/make/**/*.dmg

          - name: Windows x64
            os: windows-latest
            artifact: out/make/squirrel.windows/**/*.exe

          - name: Linux x64
            os: ubuntu-latest
            artifact: out/make/**/*.{deb,rpm}
            apt_deps: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.apt_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate (macOS)
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Prepare notarization credentials (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          KEY_PATH="$RUNNER_TEMP/apple_api_key.p8"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"

      - name: Build distributables
        # @electron/osx-sign and @electron/notarize log via the `debug` module and are
        # silent by default. On macOS, notarization can wait several minutes on Apple's
        # notary service with no output — which looks like a hang. Enabling DEBUG surfaces
        # the signing + "waiting for notarization" progress so the build is never mistaken
        # for stuck. Harmless on Windows/Linux (those namespaces never fire).
        env:
          DEBUG: electron-osx-sign,electron-notarize
        run: npm run make

      - name: Clean up notarization key (macOS)
        if: always() && matrix.os == 'macos-latest'
        run: rm -f "$RUNNER_TEMP/apple_api_key.p8"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: ${{ matrix.artifact }}
