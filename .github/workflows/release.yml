name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — must already exist'
        required: true

permissions:
  contents: write

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags are required for conventional-changelog.
          fetch-depth: 0
          # Check out the branch (not the detached tag) so we can commit CHANGELOG.md back.
          ref: develop

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips the Electron binary download we don't need here.
        run: npm ci --ignore-scripts

      - name: Generate full CHANGELOG.md
        run: npm run changelog

      - name: Extract latest release notes
        # Slice out just the newest version section for the GitHub Release body.
        run: awk '/^#{1,3} \[?v?[0-9]+\.[0-9]+/{c++} c==1' CHANGELOG.md > RELEASE_NOTES.md

      - name: Commit CHANGELOG.md back to develop
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- CHANGELOG.md; then
            echo 'CHANGELOG.md unchanged — nothing to commit.'
          else
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG for ${{ github.event.inputs.tag || github.ref_name }} [skip ci]"
            git push origin HEAD:develop
          fi

      - name: Assemble release body
        run: |
          cat RELEASE_NOTES.md > release_body.md
          cat >> release_body.md <<'EOF'

          ---
          > **macOS users:** if you see *"the app is damaged and can't be opened"*, run this once in Terminal after moving the app to Applications:
          > ```
          > xattr -cr /Applications/dginxNotes.app
          > ```
          EOF

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release_body.md

  build:
    name: Build – ${{ matrix.name }}
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            artifact: out/make/**/*.zip

          - name: Windows x64
            os: windows-latest
            artifact: out/make/squirrel.windows/**/*.exe

          - name: Linux x64
            os: ubuntu-latest
            artifact: out/make/**/*.{deb,rpm}
            apt_deps: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.apt_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: ${{ matrix.artifact }}
